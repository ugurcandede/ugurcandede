<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 425" width="1080" height="418">
  <style>
<!--    .bg           { fill: #0b0d10; }-->
    .frame        { fill: #0f1114; stroke: #2a3036; }
    .titlebar     { fill: #12151a; }
    .border       { stroke: #2a3036; }
    .dot          { fill: #4ade80; opacity: 0.06; }
    .vignette-0   { stop-color: #0b0d10; stop-opacity: 0; }
    .vignette-1   { stop-color: #000000; stop-opacity: 0.5; }

    .text-primary { fill: #e5e7eb; }
    .text-body    { fill: #d4d4d4; }
    .text-muted   { fill: #7a8087; }

    .accent-green  { fill: #4ade80; }
    .accent-cyan   { fill: #22d3ee; }
    .accent-yellow { fill: #facc15; }

    @media (prefers-color-scheme: light) {
<!--      .bg           { fill: #f8fafc; }-->
      .frame        { fill: #ffffff; stroke: #cbd5e1; }
      .titlebar     { fill: #f1f5f9; }
      .border       { stroke: #cbd5e1; }
      .dot          { fill: #16a34a; opacity: 0.1; }
      .vignette-0   { stop-color: #f8fafc; stop-opacity: 0; }
      .vignette-1   { stop-color: #94a3b8; stop-opacity: 0.18; }

      .text-primary { fill: #0f172a; }
      .text-body    { fill: #334155; }
      .text-muted   { fill: #64748b; }

      .accent-green  { fill: #16a34a; }
      .accent-cyan   { fill: #0891b2; }
      .accent-yellow { fill: #ca8a04; }
    }
  </style>

  <!-- terminal frame -->
  <rect class="frame" x="0" y="2" width="1080" height="420" rx="10" stroke-width="1.5"/>

  <!-- title bar -->
  <path class="titlebar" d="M 10 0 H 1070 A 10 10 0 0 1 1080 10 V 44 H 0 V 10 A 10 10 0 0 1 10 0 Z"/>
  <line class="border" x1="0" y1="44" x2="1080" y2="44" stroke-width="1"/>

  <!-- traffic lights (theme-invariant) -->
  <circle cx="28" cy="22" r="7" fill="#ef4444"/>
  <circle cx="50" cy="22" r="7" fill="#f59e0b"/>
  <circle cx="72" cy="22" r="7" fill="#22c55e"/>

  <!-- session tab -->
  <text class="accent-green" x="540" y="28" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="700" letter-spacing="0.3">[ugurcandede]</text>

  <!-- LEFT: ASCII panel — always dark regardless of theme so portrait stays readable -->
  <rect x="40" y="60" width="222" height="285" rx="6" fill="#0b0d10" stroke="#2a3036" stroke-width="1"/>

  <!-- ASCII portrait -->
  <text x="161" y="68" fill="#4ade80" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
        font-size="7" xml:space="preserve">
    <tspan x="161" dy="0">*********************************+=+++++++-=+****++*:::=</tspan>
    <tspan x="161" dy="7">****************************+=====:===:-----+*******=.-=</tspan>
    <tspan x="161" dy="7">**********************+++++=======--+==:----=+****++-.:-</tspan>
    <tspan x="161" dy="7">***************+++++++=+++=========--===:----+***+*+=::-</tspan>
    <tspan x="161" dy="7">***+******+++++++=+====+============--==-:----++**+*=.:-</tspan>
    <tspan x="161" dy="7">+++++++++++++++++=+++===============--===-::::-++++++.::</tspan>
    <tspan x="161" dy="7">*++=+++++++++++++=+==================--:=++++=--+++++-.:</tspan>
    <tspan x="161" dy="7">++++++++++++=+=+====+==============-====----==-+++++=-.:</tspan>
    <tspan x="161" dy="7">++++++++++++=+++=====+============----------==+++====-..</tspan>
    <tspan x="161" dy="7">+++++++++++++++==============----==---------==========:.</tspan>
    <tspan x="161" dy="7">++++*++==+=+==================---------------=======-=+.</tspan>
    <tspan x="161" dy="7">+====-==+-=============-:::::=------------------====--+*</tspan>
    <tspan x="161" dy="7">+++===-==--==========:.:...::::..---------------=-----=+</tspan>
    <tspan x="161" dy="7">==================--.......:::::.::..:-----:----===----=</tspan>
    <tspan x="161" dy="7">===============----::.:=**######*+-:...----:-------=----</tspan>
    <tspan x="161" dy="7">=========----=------.=############*=-:..:-::--:---------</tspan>
    <tspan x="161" dy="7">--------------------=######=++**=#**==:.::::::::::=-----</tspan>
    <tspan x="161" dy="7">------------------:-#**#=------+##+*=+-:::::::::::------</tspan>
    <tspan x="161" dy="7">-----------------:+*++#%*=-::-::*###===-.:::::::::::----</tspan>
    <tspan x="161" dy="7">--------:::-:--:::-+==##*-:.::=*##%%*=+#*-:::::::::::::-</tspan>
    <tspan x="161" dy="7">------::-:::::::::..:=####*****##%%%#*#%%=:::....:::::::</tspan>
    <tspan x="161" dy="7">.. .:-----::::::::::**+*++##%%%%%%%#*+#+#+:--....:::::::</tspan>
    <tspan x="161" dy="7">.   .:::::::::::::::%*=*++-=#%*#%*#***%%-::+=.....::::::</tspan>
    <tspan x="161" dy="7">..  .*:..:::::::::::#==####*+***##+#++=::::#+:....::::::</tspan>
    <tspan x="161" dy="7">..   +@%=...::::::::*=*-:-+++=++**++=#+:-::==.....:=++-:</tspan>
    <tspan x="161" dy="7">...  .%%+. .:*+-:::::-+--++=-+==+=-=*%=---::-.....=%%#**</tspan>
    <tspan x="161" dy="7">...  .#**. .:%#%#=-::.=----:::.--=+*#%-+-:*==:....-*%%%#</tspan>
    <tspan x="161" dy="7"> ..++###=.  :-%**%+**-:::.:::--===*+##=::--:=:.....+*##%</tspan>
    <tspan x="161" dy="7">%*=:%%@%:.  --#=:**+:.:..+=--=+**#*##+:-:::.:.   .... ..</tspan>
    <tspan x="161" dy="7">==::#*@::...:.:=...  -:..+#########*---==:.....:..:-....</tspan>
    <tspan x="161" dy="7">==.......:........-:.===-=*###*#++-=----=::::::..:------</tspan>
    <tspan x="161" dy="7">*-....   ...:.=-::::-+=+-+##%%%#====---+-::::::..:::.:--</tspan>
    <tspan x="161" dy="7">:.......:::---==::::=+---=+##%%+-====--:--:::--:::--:.:-</tspan>
    <tspan x="161" dy="7">....-+---==-==-::::-==+-**+#%%#+--==-:+=--:---==--=---::</tspan>
    <tspan x="161" dy="7">....%*++=+=++=::--=-=+=-*##%%##%=++=+::=-=-----=====+=-:</tspan>
    <tspan x="161" dy="7">...%#+++=+*+=-:--==-=+=-+#%%%%#%@-------------=======+=:</tspan>
    <tspan x="161" dy="7">..+#++=**=+=-:--===-=*+=#%%%%%%#*-=======---========+-=+</tspan>
    <tspan x="161" dy="7">.-*=+*#+##+------=-===+*%@%%%#%%#*==--===-=-============</tspan>
    <tspan x="161" dy="7">:#=#*+++*%=---===---++*%%%#%%%%#%*=---==-==-=+++========</tspan>
    <tspan x="161" dy="7">###--++#**=---=-----:*%@%#%##%%%#%+-==:+==-=+-==++=++-=:</tspan>
  </text>

  <!-- color dots — outside the panel, horizontally centered on it
       (block width = 7·12 + 6·6 = 120; start x = 161 - 60 = 101) -->
  <g>
    <rect x="101" y="360" width="12" height="12" rx="2" fill="#f87171"/>
    <rect x="119" y="360" width="12" height="12" rx="2" fill="#4ade80"/>
    <rect x="137" y="360" width="12" height="12" rx="2" fill="#facc15"/>
    <rect x="155" y="360" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="173" y="360" width="12" height="12" rx="2" fill="#e879f9"/>
    <rect x="191" y="360" width="12" height="12" rx="2" fill="#22d3ee"/>
    <rect x="209" y="360" width="12" height="12" rx="2" fill="#d4d4d4"/>
  </g>

  <!-- RIGHT: neofetch info -->
  <!-- header -->
  <text x="310" y="80" font-family="'JetBrains Mono', monospace" font-size="17" font-weight="700">
    <tspan class="accent-green">ugurcandede</tspan><tspan class="text-muted">@</tspan><tspan class="accent-cyan">github</tspan>
  </text>
  <line class="border" x1="310" y1="98" x2="1030" y2="98" stroke-width="1.4"/>

  <!-- info rows -->
  <g font-family="'JetBrains Mono', monospace" font-size="14">
    <text class="accent-green" x="310" y="130" font-weight="600">NAME</text>
    <text class="text-primary" x="420" y="130" font-weight="600">Ugurcan Dede</text>

    <text class="accent-green" x="310" y="152" font-weight="600">TITLE</text>
    <text class="text-body"    x="420" y="152">Developer @ Grispi</text>

    <text class="accent-green" x="310" y="174" font-weight="600">LOCATION</text>
    <text class="text-body"    x="420" y="174">Bursa, Turkiye</text>

    <text class="accent-green" x="310" y="196" font-weight="600">EDUCATION</text>
    <text x="420" y="196">
      <tspan class="text-body">CS @ </tspan>
      <tspan class="text-primary" font-weight="600">Uludag University</tspan>
      <tspan class="text-body"> · </tspan>
      <tspan class="accent-cyan">MIS</tspan>
    </text>

    <text class="accent-green" x="310" y="218" font-weight="600">COMPANY</text>
    <text x="420" y="218">
      <tspan class="accent-yellow" font-weight="600">Grispi</tspan>
      <tspan class="text-body"> · Izmir, Turkiye | Remote</tspan>
    </text>

    <text class="accent-green" x="310" y="240" font-weight="600">STACK</text>
    <text class="text-body"    x="420" y="240">Java · Kotlin · PostgreSQL · Elasticsearch</text>

    <text class="accent-green" x="310" y="262" font-weight="600">SHELL</text>
    <text class="text-body"    x="420" y="262">javac (21.0.10)</text>

    <text class="accent-green" x="310" y="284" font-weight="600">UPTIME</text>
    <text class="text-body"    x="420" y="284">since 2022 · full-time</text>
  </g>

  <!-- bio -->
  <g font-family="'JetBrains Mono', monospace" font-size="13">
    <text class="text-body" x="310" y="322">Developer with a taste for hard problems. Building customer support infrastructure at</text>
    <text x="310" y="339">
      <tspan class="accent-yellow" font-weight="600">Grispi</tspan> <tspan class="text-body"> since 2022 — Lately pushing into full-stack territory.</tspan>
    </text>
    <text class="text-body" x="310" y="368"> After hours I ship small tools: TapLock, claude-symlink, a Windows Terminal layout generator.</text>
  </g>
</svg>